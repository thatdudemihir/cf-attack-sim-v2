<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WAF Simulator v2 — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0c0f;
      --surface:   #10141a;
      --border:    #1e2530;
      --accent:    #e63946;
      --accent2:   #f4a261;
      --text:      #c9d1d9;
      --muted:     #4a5568;
      --mono:      'Share Tech Mono', monospace;
      --sans:      'Rajdhani', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(230,57,70,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(230,57,70,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 2rem;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(230,57,70,0.1);
      border: 1px solid rgba(230,57,70,0.3);
      padding: 0.4rem 1rem;
      border-radius: 2px;
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    .logo-badge::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #fff;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 0.3rem;
      letter-spacing: 0.1em;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 2px solid var(--accent);
      padding: 2rem;
      margin-top: 0;
    }

    .field { margin-bottom: 1.25rem; }

    label {
      display: block;
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      margin-bottom: 0.4rem;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.9rem;
      padding: 0.65rem 0.8rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: var(--accent); }

    .error-msg {
      background: rgba(230,57,70,0.1);
      border: 1px solid rgba(230,57,70,0.4);
      color: var(--accent);
      font-family: var(--mono);
      font-size: 0.75rem;
      padding: 0.6rem 0.8rem;
      margin-bottom: 1.25rem;
      letter-spacing: 0.05em;
    }

    .error-msg::before { content: '⚠ '; }

    button[type="submit"] {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      font-family: var(--sans);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 0.75rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      text-transform: uppercase;
      margin-top: 0.5rem;
    }

    button[type="submit"]:hover  { background: #c1121f; }
    button[type="submit"]:active { transform: scale(0.99); }

    .footer-note {
      text-align: center;
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--muted);
      margin-top: 1.5rem;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-badge">AUTHORIZED ACCESS ONLY</div>
      <h1>WAF <span>Simulator</span> <span style="font-size:1rem;color:var(--muted)">v2</span></h1>
      <p class="subtitle">// CLOUDFLARE + SENTINELONE DEMO PLATFORM</p>
    </div>

    <div class="card">
      {% if error %}
        <div class="error-msg">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/login">
        <div class="field">
          <label>Username</label>
          <input type="text" name="username" autocomplete="username" autofocus required />
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" name="password" autocomplete="current-password" required />
        </div>
        <button type="submit">Authenticate →</button>
      </form>
    </div>

    <p class="footer-note">Only target systems you own or have written permission to test.</p>
  </div>
</body>
</html>
